# zaz configuration for developing zaz itself

[[group]]
name = "rust"
patterns = ["**/*.rs", "Cargo.toml", "Cargo.lock"]
ignore = ["target/**"]
tasks = [
  { command = "cargo fmt --check" },
  { command = "cargo clippy --all-targets --all-features -- -D warnings" },
  { command = "cargo build" },
  { command = "cargo test --workspace" },
]

[[group]]
name = "markdown"
patterns = ["**/*.md"]
ignore = ["target/**"]
tasks = [
  { command = "bin/rumdl check ." },
]

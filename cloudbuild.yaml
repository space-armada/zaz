# GCB (cloudbuild) config for zaz CI.
#
# Setup: create one or more triggers in GCB. Both branch pushes and tag pushes
# are supported; the same checks run for either.
#
# What it does:
#
#   - Runs the full `make ci` gate: fmt-check, lint, build, test, docs-check.
#   - Caches the cargo registry, the rustup toolchain, and the rumdl download
#     so a warm build skips re-fetching crates and re-resolving the toolchain.
#     target/ is intentionally not cached; see Save-Cache.
#
# The cache object is keyed on a hash of Cargo.lock and rust-toolchain.toml,
# so it is rewritten only when dependencies or the toolchain change. Every
# build (PR, main, tag) restores it; only main writes it, and even then it
# skips the compress-and-upload when the keyed object already exists. PR and
# tag builds never pay any save cost.
#
# Caching lives in the default cloudbuild staging bucket, which already exists
# for every project, so no extra setup is needed. Only /workspace is shared
# between steps, so CARGO_HOME, RUSTUP_HOME, and the rumdl cache are pinned
# under /workspace to make them cacheable.

steps:
  - id: Restore-Cache
    name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # A missing cache is normal on the first build; never fail on it.
        set +e
        if [[ -n "$TAG_NAME" ]]; then
          echo "Build type: TAG $TAG_NAME"
        else
          echo "Build type: COMMIT $SHORT_SHA"
        fi
        # The cache contents are determined entirely by the locked dependency
        # set and the toolchain pin, so key the object on a hash of both. When
        # neither changes, every build reuses the same object and the save step
        # short-circuits instead of recompressing.
        KEY=$(sha256sum Cargo.lock rust-toolchain.toml | sha256sum | cut -c1-16)
        OBJ="${_CACHE_BUCKET}/cache-$$KEY.tar.gz"
        echo "Cache key: $$KEY"
        gsutil cp "$$OBJ" /workspace/cache.tar.gz
        if [[ -f /workspace/cache.tar.gz ]]; then
          tar -xzf /workspace/cache.tar.gz -C /workspace
          echo "Restored cache from $$OBJ"
        else
          echo "No cache for key $$KEY; building cold"
        fi
        exit 0

  - id: CI
    name: 'rust:1-trixie'
    env:
      # Relocate the cargo registry and the rustup toolchain into /workspace so they survive as cache;
      # rust-toolchain.toml pins `stable`, which rustup would otherwise re-resolve and redownload from
      # its default home.
      - 'CARGO_HOME=/workspace/.cargo-home'
      - 'RUSTUP_HOME=/workspace/.rustup'
      - 'CARGO_TERM_COLOR=always'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        export PATH="$$CARGO_HOME/bin:$$PATH"
        make ci

  - id: Save-Cache
    name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        # Only the main branch writes the shared cache; PR and tag builds read
        # it but never pay the save cost. $BRANCH_NAME is the pushed branch on
        # main, the head branch on PRs, and empty on tag builds.
        if [[ "$BRANCH_NAME" != "main" ]]; then
          echo "Not on main (BRANCH_NAME='$BRANCH_NAME'); skipping cache save"
          exit 0
        fi
        KEY=$(sha256sum Cargo.lock rust-toolchain.toml | sha256sum | cut -c1-16)
        OBJ="${_CACHE_BUCKET}/cache-$$KEY.tar.gz"
        # The object is immutable per key, so if it already exists the contents
        # are unchanged and there is nothing to compress or upload.
        if gsutil -q stat "$$OBJ"; then
          echo "Cache $$OBJ already current; skipping compress and upload"
          exit 0
        fi
        # Only archive the dirs that actually exist after the build.
        # target/ is deliberately excluded: it dwarfs the cache and its
        # round-trip costs more than recompiling from a warm crate registry.
        dirs=()
        for d in .cargo-home .rustup .cache; do
          [[ -d "/workspace/$$d" ]] && dirs+=("$$d")
        done
        if [[ "$${#dirs[@]}" -eq 0 ]]; then
          echo "Nothing to cache"
          exit 0
        fi
        tar -czf /workspace/cache.tar.gz -C /workspace "$${dirs[@]}"
        gsutil cp /workspace/cache.tar.gz "$$OBJ"
        echo "Saved cache to $$OBJ"

substitutions:
  _CACHE_BUCKET: 'gs://${PROJECT_ID}_cloudbuild/zaz-cache'

timeout: 1800s

options:
  dynamicSubstitutions: true
